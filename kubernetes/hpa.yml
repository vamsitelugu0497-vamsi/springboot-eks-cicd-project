apiVersion: autoscaling/v2

kind: HorizontalPodAutoscaler

metadata:
  name: spring-boot-app-hpa
  namespace: devops

spec:

  scaleTargetRef:

    apiVersion: apps/v1

    kind: Deployment

    name: spring-boot-app

  minReplicas: 2

  maxReplicas: 5

  metrics:

  - type: Resource

    resource:

      name: cpu

      target:

        type: Utilization

        averageUtilization: 70
